name: CI

on:
  push:
    branches: [main]
    # semver release tags only (consistent across the host-* tools)
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: host-lifecycle-linux-amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            name: host-lifecycle-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: host-lifecycle-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: host-lifecycle-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: host-lifecycle-windows-amd64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            name: host-lifecycle-windows-arm64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Install musl toolchain
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage binary
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/host-lifecycle"
          [ -f "$bin.exe" ] && bin="$bin.exe"
          cp "$bin" "${{ matrix.name }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Test
        run: cargo test --verbose
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  allium:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install allium-cli (pinned 3.4.2)
        run: cargo install allium-cli --version 3.4.2
      - name: allium check
        run: allium check host-lifecycle.allium
      - name: allium analyse
        run: allium analyse host-lifecycle.allium
      - name: allium plan (test obligations)
        run: allium plan host-lifecycle.allium
      - name: Build host-lifecycle (drives its own obligations check, no self-install)
        run: cargo build --release --locked
      - name: Discharge obligations (every obligation dispositioned, test refs exist)
        run: ./target/release/host-lifecycle obligations host-lifecycle.allium --tests src

  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, test]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: host-lifecycle-*
          path: dist
          merge-multiple: true
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*
